<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Tính thuế thu nhập cá nhân</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container-box">

    <h1 class="title red">
      Tính thuế thu nhập cá nhân
    </h1>

    <div class="form-group">

      <input id="hoTen" type="text" placeholder="Họ tên">

      <input id="tongThuNhap"
             type="number"
             placeholder="Tổng thu nhập năm">

      <input id="nguoiPhuThuoc"
             type="number"
             placeholder="Số người phụ thuộc">

    </div>

    <button onclick="tinhThue()">
      Tính thuế
    </button>

    <div id="ketQua" class="result"></div>

  </div>

  <script src="main.js"></script>

</body>
</html>
